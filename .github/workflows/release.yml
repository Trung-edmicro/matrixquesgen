name: Build & Release

on:
  push:
    tags:
      - "v*.*.*" # Trigger when a version tag like v1.2.3 is pushed
  workflow_dispatch: # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: "Version number (e.g. 1.2.3)"
        required: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Resolve version ───────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $ver = "${{ github.ref_name }}".TrimStart("v")
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $ver"

      # ── Set up Python ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        shell: pwsh
        run: |
          # Mirror exactly what build.ps1 does: use a venv
          python -m venv .venv
          .venv\Scripts\python.exe -m pip install --upgrade pip
          .venv\Scripts\pip.exe install -r server-requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "Failed to install server-requirements.txt" }
          .venv\Scripts\pip.exe install "pyinstaller==6.17.0" pillow
          if ($LASTEXITCODE -ne 0) { throw "Failed to install pyinstaller/pillow" }
          # Validate required packages are present
          .venv\Scripts\python.exe -c "import fastapi, uvicorn, starlette, pydantic; print('All required packages OK')"
          if ($LASTEXITCODE -ne 0) { throw "Required packages missing after install!" }

      # ── Set up Node.js ────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      # ── Bump version in source files ──────────────────────────────
      - name: Bump version
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)

          # version.py
          $content = (Get-Content version.py -Raw) -replace '__version__ = ".*"', "__version__ = `"$ver`""
          [System.IO.File]::WriteAllText("$PWD/version.py", $content, $utf8NoBom)

          # inno_setup.iss
          $content = (Get-Content inno_setup.iss -Raw) `
            -replace 'AppVersion=.*', "AppVersion=$ver" `
            -replace 'OutputBaseFilename=.*', "OutputBaseFilename=MatrixQuesGen_Setup_$ver"
          [System.IO.File]::WriteAllText("$PWD/inno_setup.iss", $content, $utf8NoBom)

          echo "Bumped to version $ver"

      # ── Build React client ────────────────────────────────────────
      - name: Build React client
        shell: pwsh
        working-directory: client
        run: |
          npm ci
          npm run build

      # ── Create placeholder .env (not in repo; user fills after install) ──
      - name: Create placeholder .env
        shell: pwsh
        run: |
          if (-not (Test-Path .env)) {
            $lines = @(
              "# MatrixQuesGen Configuration",
              "# Fill in your API keys after installation",
              "GITHUB_REPO=Trung-edmicro/matrixquesgen",
              "GEMINI_API_KEY="
            )
            $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
            [System.IO.File]::WriteAllLines(".env", $lines, $utf8NoBom)
          }

      # ── Fix favicon.ico (PNG renamed to .ico → convert to real ICO) ──
      - name: Fix favicon.ico format
        shell: pwsh
        run: |
          .venv\Scripts\python.exe scripts/fix_ico.py

      # ── Prepare assets (MML2OMML.XSL not available on CI - feature gracefully disabled) ─
      - name: Create assets directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          Write-Host "Note: MML2OMML.XSL not available on CI runner (no Office installed)."
          Write-Host "Math OMML conversion will be disabled in CI-built exe."
          Write-Host "(Dev builds via build.ps1 auto-copy from Office if installed.)"

      # ── Build PyInstaller exe ─────────────────────────────────────
      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          # Use venv Python — same as build.ps1
          .venv\Scripts\python.exe -m PyInstaller matrixquesgen.spec --noconfirm --clean
          if (-not (Test-Path "dist\MatrixQuesGen.exe")) {
            throw "PyInstaller build failed – dist\MatrixQuesGen.exe not found"
          }

      # ── Build Inno Setup installer ────────────────────────────────
      - name: Create data/ directory structure for installer
        shell: pwsh
        run: |
          # Mirror the same subdirectories that build.ps1 creates
          @('input','output','sessions','questions','exports','prompts','.drive_metadata','matrix','content','images','logs') | ForEach-Object {
            New-Item -ItemType Directory -Force -Path "data\$_" | Out-Null
          }
          Write-Host "Created data/ directory structure"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          & $iscc inno_setup.iss
          $ver = "${{ steps.version.outputs.VERSION }}"
          $installer = "installer\MatrixQuesGen_Setup_$ver.exe"
          if (-not (Test-Path $installer)) {
            Get-ChildItem installer\
            throw "Installer not found: $installer"
          }
          echo "INSTALLER=$installer" >> $env:GITHUB_ENV

      # ── Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: MatrixQuesGen v${{ steps.version.outputs.VERSION }}
          body: |
            ## 📥 Cài đặt lần đầu

            1. Tải file **MatrixQuesGen_Setup_${{ steps.version.outputs.VERSION }}.exe** bên dưới
            2. Chạy file Setup → làm theo hướng dẫn (Next → Next → Install)
            3. Sau khi cài xong, ứng dụng tự khởi động

            ## 🔄 Cập nhật từ phiên bản cũ

            Mở ứng dụng → vào **Cài đặt** → **Kiểm tra cập nhật** → ứng dụng sẽ tự tải và cài bản mới.

            Hoặc: tải file Setup bên dưới và chạy trực tiếp — installer sẽ tự ghi đè bản cũ.

            ## ⚙️ Yêu cầu hệ thống

            - Windows 10 / 11
            - Kết nối internet (để dùng Google AI và đồng bộ Drive)

            ## 📂 Cấu hình sau cài đặt

            Tải thư mục dữ liệu từ [Drive](https://drive.google.com/drive/folders/1HbNS53txcsWZ2t2C0sHkPqFg-iJuHx7b?usp=sharing) về máy, giải nén vào thư mục `data` trong thư mục cài đặt.
          files: installer/MatrixQuesGen_Setup_${{ steps.version.outputs.VERSION }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
